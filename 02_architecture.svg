<svg viewBox="0 0 900 460" xmlns="http://www.w3.org/2000/svg" font-family="Inter,Arial,sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1a"/>
      <stop offset="100%" style="stop-color:#0d1524"/>
    </linearGradient>
  </defs>
  <rect width="900" height="460" fill="url(#bg2)" rx="12"/>
  <pattern id="grid2" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  </pattern>
  <rect width="900" height="460" fill="url(#grid2)" rx="12"/>

  <text x="450" y="42" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff" letter-spacing="-0.5">Architecture — How HireIQ Works</text>
  <text x="450" y="62" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.4)">Single HTML file · No backend · No database · No server costs</text>

  <!-- Layer labels -->
  <text x="30" y="115" font-size="10" font-weight="700" fill="rgba(255,255,255,0.3)" text-transform="uppercase" letter-spacing="1">USER</text>
  <text x="30" y="210" font-size="10" font-weight="700" fill="rgba(255,255,255,0.3)" letter-spacing="1">APP</text>
  <text x="30" y="320" font-size="10" font-weight="700" fill="rgba(255,255,255,0.3)" letter-spacing="1">DATA</text>
  <text x="30" y="415" font-size="10" font-weight="700" fill="rgba(255,255,255,0.3)" letter-spacing="1">APIs</text>

  <!-- Horizontal dividers -->
  <line x1="60" y1="130" x2="870" y2="130" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="60" y1="240" x2="870" y2="240" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="60" y1="345" x2="870" y2="345" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- USER LAYER: browser icons -->
  <g transform="translate(80,88)">
    <rect width="120" height="38" rx="8" fill="#1a2236" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text x="60" y="24" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.7)">🖥️ Desktop</text>
  </g>
  <g transform="translate(220,88)">
    <rect width="120" height="38" rx="8" fill="#1a2236" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text x="60" y="24" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.7)">📱 Mobile PWA</text>
  </g>
  <g transform="translate(360,88)">
    <rect width="120" height="38" rx="8" fill="#1a2236" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text x="60" y="24" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.7)">💻 Tablet</text>
  </g>
  <text x="570" y="112" font-size="10.5" fill="rgba(255,255,255,0.35)">Chrome · Safari · Firefox · Edge</text>

  <!-- APP LAYER: index.html -->
  <g transform="translate(80,148)">
    <rect width="720" height="78" rx="10" fill="#0ea47a" fill-opacity="0.08" stroke="#0ea47a" stroke-width="1.2"/>
    <text x="360" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#0ea47a">index.html  ·  ~300KB  ·  Single file</text>
    <text x="120" y="48" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.5)">HTML + CSS</text>
    <text x="260" y="48" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.5)">JavaScript</text>
    <text x="400" y="48" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.5)">Service Worker</text>
    <text x="540" y="48" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.5)">docx.js CDN</text>
    <text x="660" y="48" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.5)">Mammoth.js CDN</text>
    <text x="360" y="66" text-anchor="middle" font-size="9.5" fill="rgba(255,255,255,0.28)">Zero build step · Zero framework · Zero dependencies to install</text>
  </g>

  <!-- DATA LAYER -->
  <g transform="translate(80,258)">
    <rect width="220" height="72" rx="10" fill="#1a2236" stroke="#60a5fa" stroke-width="1.2"/>
    <text x="110" y="24" text-anchor="middle" font-size="12" font-weight="600" fill="#60a5fa">localStorage</text>
    <text x="110" y="42" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.45)">Resume · Tracker · Alerts</text>
    <text x="110" y="58" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.45)">Settings · Search history</text>
  </g>
  <g transform="translate(320,258)">
    <rect width="220" height="72" rx="10" fill="#1a2236" stroke="#a78bfa" stroke-width="1.2"/>
    <text x="110" y="24" text-anchor="middle" font-size="12" font-weight="600" fill="#a78bfa">Your Browser</text>
    <text x="110" y="42" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.45)">Keys never leave your device</text>
    <text x="110" y="58" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.45)">No server · No account needed</text>
  </g>
  <g transform="translate(560,258)">
    <rect width="238" height="72" rx="10" fill="#1a2236" stroke="#4ade80" stroke-width="1.2"/>
    <text x="119" y="24" text-anchor="middle" font-size="12" font-weight="600" fill="#4ade80">Vercel (static)</text>
    <text x="119" y="42" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.45)">Serves 3 files: index.html</text>
    <text x="119" y="58" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.45)">sw.js · vercel.json · Free tier</text>
  </g>

  <!-- API LAYER -->
  <g transform="translate(80,358)">
    <rect width="260" height="72" rx="10" fill="#1a2236" stroke="#0ea47a" stroke-width="1.5"/>
    <text x="130" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#0ea47a">Groq API</text>
    <text x="130" y="40" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.5)">llama-3.3-70b-versatile</text>
    <text x="130" y="56" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.5)">AI features · Free tier</text>
    <rect x="170" y="62" width="50" height="16" rx="8" fill="#0ea47a" fill-opacity="0.2"/>
    <text x="195" y="74" text-anchor="middle" font-size="9" fill="#0ea47a" font-weight="600">FREE</text>
  </g>
  <g transform="translate(360,358)">
    <rect width="260" height="72" rx="10" fill="#1a2236" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="130" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#f59e0b">RapidAPI JSearch</text>
    <text x="130" y="40" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.5)">Licensed job aggregator</text>
    <text x="130" y="56" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.5)">LinkedIn · Indeed · Glassdoor</text>
    <rect x="170" y="62" width="90" height="16" rx="8" fill="#f59e0b" fill-opacity="0.2"/>
    <text x="215" y="74" text-anchor="middle" font-size="9" fill="#f59e0b" font-weight="600">200 req/mo FREE</text>
  </g>
  <g transform="translate(640,358)">
    <rect width="200" height="72" rx="10" fill="#1a2236" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <text x="100" y="22" text-anchor="middle" font-size="12" font-weight="600" fill="rgba(255,255,255,0.6)">Google Fonts</text>
    <text x="100" y="40" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.4)">Inter + DM Sans</text>
    <text x="100" y="56" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.4)">CDN · Free</text>
  </g>

  <!-- Connecting arrows (data flow) -->
  <line x1="440" y1="226" x2="190" y2="258" stroke="#60a5fa" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
  <line x1="440" y1="226" x2="430" y2="258" stroke="#a78bfa" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
  <line x1="440" y1="226" x2="679" y2="258" stroke="#4ade80" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
  <line x1="210" y1="330" x2="210" y2="358" stroke="#0ea47a" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
  <line x1="490" y1="330" x2="490" y2="358" stroke="#f59e0b" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
</svg>