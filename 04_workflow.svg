<svg viewBox="0 0 900 240" xmlns="http://www.w3.org/2000/svg" font-family="Inter,Arial,sans-serif">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1a"/>
      <stop offset="100%" style="stop-color:#0d1524"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="rgba(255,255,255,0.25)"/>
    </marker>
  </defs>
  <rect width="900" height="240" fill="url(#bg4)" rx="12"/>
  <pattern id="grid4" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  </pattern>
  <rect width="900" height="240" fill="url(#grid4)" rx="12"/>

  <text x="450" y="36" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff" letter-spacing="-0.3">The Complete Job Search Journey</text>

  <!-- Steps -->
  <!-- Step 1 -->
  <g transform="translate(30,65)">
    <rect width="128" height="120" rx="10" fill="#111827" stroke="#0ea47a" stroke-width="1.5"/>
    <rect width="128" height="28" rx="10" fill="#0ea47a" fill-opacity="0.2"/>
    <rect width="128" height="18" rx="0" fill="#0ea47a" fill-opacity="0.2" transform="translate(0,10)"/>
    <text x="64" y="19" text-anchor="middle" font-size="10" font-weight="700" fill="#0ea47a" letter-spacing="0.5">STEP 1</text>
    <text x="64" y="50" text-anchor="middle" font-size="20">🔍</text>
    <text x="64" y="72" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Search</text>
    <text x="64" y="88" text-anchor="middle" font-size="9.5" fill="rgba(255,255,255,0.45)">Live jobs from</text>
    <text x="64" y="102" text-anchor="middle" font-size="9.5" fill="rgba(255,255,255,0.45)">LinkedIn · Indeed</text>
  </g>
  <line x1="162" y1="125" x2="186" y2="125" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2 -->
  <g transform="translate(190,65)">
    <rect width="128" height="120" rx="10" fill="#111827" stroke="#6c5ce7" stroke-width="1.5"/>
    <rect width="128" height="28" rx="10" fill="#6c5ce7" fill-opacity="0.2"/>
    <rect width="128" height="18" rx="0" fill="#6c5ce7" fill-opacity="0.2" transform="translate(0,10)"/>
    <text x="64" y="19" text-anchor="middle" font-size="10" font-weight="700" fill="#a78bfa" letter-spacing="0.5">STEP 2</text>
    <text x="64" y="50" text-anchor="middle" font-size="20">🎯</text>
    <text x="64" y="72" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Match &amp; Tailor</text>
    <text x="64" y="88" text-anchor="middle" font-size="9.5" fill="rgba(255,255,255,0.45)">ATS check · AI</text>
    <text x="64" y="102" text-anchor="middle" font-size="9.5" fill="rgba(255,255,255,0.45)">resume tailoring</text>
  </g>
  <line x1="322" y1="125" x2="346" y2="125" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 3 -->
  <g transform="translate(350,65)">
    <rect width="128" height="120" rx="10" fill="#111827" stroke="#fb923c" stroke-width="1.5"/>
    <rect width="128" height="28" rx="10" fill="#fb923c" fill-opacity="0.2"/>
    <rect width="128" height="18" rx="0" fill="#fb923c" fill-opacity="0.2" transform="translate(0,10)"/>
    <text x="64" y="19" text-anchor="middle" font-size="10" font-weight="700" fill="#fb923c" letter-spacing="0.5">STEP 3</text>
    <text x="64" y="50" text-anchor="middle" font-size="20">✉️</text>
    <text x="64" y="72" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Apply</text>
    <text x="64" y="88" text-anchor="middle" font-size="9.5" fill="rgba(255,255,255,0.45)">Cover letter · Track</text>
    <text x="64" y="102" text-anchor="middle" font-size="9.5" fill="rgba(255,255,255,0.45)">in Kanban board</text>
  </g>
  <line x1="482" y1="125" x2="506" y2="125" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 4 -->
  <g transform="translate(510,65)">
    <rect width="128" height="120" rx="10" fill="#111827" stroke="#a78bfa" stroke-width="1.5"/>
    <rect width="128" height="28" rx="10" fill="#a78bfa" fill-opacity="0.2"/>
    <rect width="128" height="18" rx="0" fill="#a78bfa" fill-opacity="0.2" transform="translate(0,10)"/>
    <text x="64" y="19" text-anchor="middle" font-size="10" font-weight="700" fill="#a78bfa" letter-spacing="0.5">STEP 4</text>
    <text x="64" y="50" text-anchor="middle" font-size="20">🎤</text>
    <text x="64" y="72" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Prepare</text>
    <text x="64" y="88" text-anchor="middle" font-size="9.5" fill="rgba(255,255,255,0.45)">Mock interviews</text>
    <text x="64" y="102" text-anchor="middle" font-size="9.5" fill="rgba(255,255,255,0.45)">Interview bank</text>
  </g>
  <line x1="642" y1="125" x2="666" y2="125" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 5 -->
  <g transform="translate(670,65)">
    <rect width="128" height="120" rx="10" fill="#111827" stroke="#4ade80" stroke-width="2"/>
    <rect width="128" height="28" rx="10" fill="#4ade80" fill-opacity="0.2"/>
    <rect width="128" height="18" rx="0" fill="#4ade80" fill-opacity="0.2" transform="translate(0,10)"/>
    <text x="64" y="19" text-anchor="middle" font-size="10" font-weight="700" fill="#4ade80" letter-spacing="0.5">STEP 5</text>
    <text x="64" y="50" text-anchor="middle" font-size="20">🤝</text>
    <text x="64" y="72" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Negotiate</text>
    <text x="64" y="88" text-anchor="middle" font-size="9.5" fill="rgba(255,255,255,0.45)">Salary estimate</text>
    <text x="64" y="102" text-anchor="middle" font-size="9.5" fill="rgba(255,255,255,0.45)">Counter-offer script</text>
  </g>

  <!-- Caption -->
  <text x="450" y="220" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.3)">HireIQ covers every step — find the job, get the offer</text>
</svg>